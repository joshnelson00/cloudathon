name: Terraform Deploy

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/terraform-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.filter.outputs.infra }}
      backend_changed: ${{ steps.filter.outputs.backend }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      workflow_changed: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            workflow:
              - '.github/workflows/terraform-deploy.yml'

  infra:
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      s3_bucket_name: ${{ steps.tfout.outputs.s3_bucket_name }}
      cloudfront_distribution_id: ${{ steps.tfout.outputs.cloudfront_distribution_id }}
      ec2_instance_id: ${{ steps.tfout.outputs.ec2_instance_id }}
      lambda_compliance_function_name: ${{ steps.tfout.outputs.lambda_compliance_function_name }}
      compliance_bucket_name: ${{ steps.tfout.outputs.compliance_bucket_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - working-directory: infra
        run: terraform init

      - name: Detect EC2 from Terraform state
        id: ec2check
        working-directory: infra
        run: |
          set -euo pipefail

          if ! ec2_id="$(terraform output -raw ec2_instance_id 2>/dev/null)"; then
            echo "ec2_missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$ec2_id" ]]; then
            echo "ec2_missing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          state="$(aws ec2 describe-instances \
            --instance-ids "$ec2_id" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text 2>/dev/null || true)"

          if [[ -z "$state" || "$state" == "None" || "$state" == "terminated" || "$state" == "shutting-down" ]]; then
            echo "ec2_missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "ec2_missing=false" >> "$GITHUB_OUTPUT"
          fi

      - working-directory: infra
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra_changed == 'true' || needs.changes.outputs.workflow_changed == 'true' || steps.ec2check.outputs.ec2_missing == 'true'
        run: terraform plan -out=tfplan

      - working-directory: infra
        if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra_changed == 'true' || needs.changes.outputs.workflow_changed == 'true' || steps.ec2check.outputs.ec2_missing == 'true'
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform Outputs
        id: tfout
        working-directory: infra
        run: |
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "ec2_instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"
          echo "lambda_compliance_function_name=$(terraform output -raw lambda_compliance_function_name)" >> "$GITHUB_OUTPUT"
          echo "compliance_bucket_name=$(terraform output -raw compliance_bucket_name)" >> "$GITHUB_OUTPUT"

  backend:
    runs-on: ubuntu-latest
    needs: [changes, infra]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend_changed == 'true' || needs.changes.outputs.infra_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package backend source
        run: |
          tar -czf backend.tgz -C backend .

      - name: Upload backend package to S3
        run: |
          aws s3 cp backend.tgz s3://${{ needs.infra.outputs.s3_bucket_name }}/deployments/backend-${{ github.sha }}.tgz

      - name: Wait for EC2 to become SSM managed
        run: |
          set -euo pipefail
          instance_id="${{ needs.infra.outputs.ec2_instance_id }}"
          for i in $(seq 1 40); do
            ping_status="$(aws ssm describe-instance-information \
              --filters Key=InstanceIds,Values="$instance_id" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)"

            if [[ "$ping_status" == "Online" ]]; then
              exit 0
            fi

            sleep 15
          done
          echo "EC2 instance is not online in SSM" >&2
          exit 1

      - name: Deploy backend on EC2 via SSM
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          set -euo pipefail
          instance_id="${{ needs.infra.outputs.ec2_instance_id }}"
          bucket="${{ needs.infra.outputs.s3_bucket_name }}"
          object_key="deployments/backend-${{ github.sha }}.tgz"
          lambda_fn="${{ needs.infra.outputs.lambda_compliance_function_name }}"
          compliance_bucket="${{ needs.infra.outputs.compliance_bucket_name }}"

          if [ -z "${JWT_SECRET_KEY:-}" ]; then
            echo "JWT_SECRET_KEY secret is not set in repository secrets" >&2
            exit 1
          fi

          # base64-encode the JWT secret so it survives both JSON encoding and
          # shell re-parsing inside the SSM command document without escape grief
          jwt_b64="$(printf '%s' "$JWT_SECRET_KEY" | base64 -w 0)"

          cat > ssm-params.json <<EOFPARAMS
          {
            "commands": [
              "set -euo pipefail",
              "mkdir -p /opt/hackathon",
              "cd /opt/hackathon",
              "aws s3 cp s3://${bucket}/${object_key} backend.tgz",
              "rm -rf backend && mkdir -p backend",
              "tar -xzf backend.tgz -C backend",
              "jwt=\"\$(printf '%s' '${jwt_b64}' | base64 -d)\"",
              "printf 'ENVIRONMENT=production\\nPORT=8000\\nALLOWED_ORIGINS=*\\nSERVICE_ENDPOINTS_JSON={\"analytics\":\"\",\"notifications\":\"\",\"payments\":\"\"}\\nUSE_MOCK_DB=false\\n' > backend/.env",
              "printf 'JWT_SECRET_KEY=%s\\n' \"\$existing_jwt\" >> backend/.env",
              "printf 'LAMBDA_COMPLIANCE_FUNCTION_NAME=${lambda_fn}\\n' >> backend/.env",
              "printf 'S3_COMPLIANCE_BUCKET=${compliance_bucket}\\n' >> backend/.env",
              "python3 -m venv /opt/hackathon/venv",
              "/opt/hackathon/venv/bin/pip install --upgrade pip",
              "/opt/hackathon/venv/bin/pip install -r /opt/hackathon/backend/requirements.txt",
              "systemctl daemon-reload",
              "systemctl restart hackathon-api.service",
              "systemctl is-active hackathon-api.service"
            ]
          }
          EOFPARAMS

          command_id="$(aws ssm send-command \
            --instance-ids "$instance_id" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend ${GITHUB_SHA}" \
            --parameters file://ssm-params.json \
            --query 'Command.CommandId' \
            --output text)"

          if ! aws ssm wait command-executed --command-id "$command_id" --instance-id "$instance_id"; then
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --query '{Status:Status,ResponseCode:ResponseCode,StandardOutput:StandardOutputContent,StandardError:StandardErrorContent}'
            exit 1
          fi

          status="$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "$instance_id" \
            --query 'Status' \
            --output text)"

          if [[ "$status" != "Success" ]]; then
            aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --query '{Status:Status,StandardOutput:StandardOutputContent,StandardError:StandardErrorContent}'
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    needs: [changes, infra]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload Frontend to S3
        run: aws s3 sync frontend/dist s3://${{ needs.infra.outputs.s3_bucket_name }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ needs.infra.outputs.cloudfront_distribution_id }} --paths '/*'

  ec2-ready-check:
    runs-on: ubuntu-latest
    needs: [changes, infra]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.infra_changed == 'true' || needs.changes.outputs.backend_changed == 'true'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Confirm EC2 instance state
        run: |
          aws ec2 describe-instance-status \
            --instance-ids "${{ needs.infra.outputs.ec2_instance_id }}" \
            --include-all-instances
